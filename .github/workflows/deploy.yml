name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a run that's mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Chromium for tests
        run: npx playwright install --with-deps chromium

      # Functional tests only — deliberately NOT the visual ones.
      #
      # The baselines in tests/visual.spec.js-snapshots/ were rendered on a
      # developer machine. A CI runner has a different font stack and GPU, so
      # text rasterises a pixel or two differently and every visual test fails
      # for reasons that have nothing to do with the change. Those baselines
      # exist to verify local refactors, not to gate deploys.
      - name: Run functional tests
        run: npx playwright test --ignore-snapshots tests/smoke.spec.js tests/hero.spec.js tests/headings.spec.js tests/contact-form.spec.js tests/i18n.spec.js tests/navbar.spec.js

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
